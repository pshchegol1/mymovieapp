<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>MovieMatrix</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72'%3E%3Ctext y='58' font-size='60'%3E%F0%9F%8E%AC%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/565394ae51.js" crossorigin="anonymous" defer></script>
  <link rel="stylesheet" href="./css/main.css">
  <script type="module" src="./js/app.js" defer></script>
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" href="#/">
      <span class="brand__icon"><i class="fa-solid fa-film" aria-hidden="true"></i></span>
      <span class="brand__name">MovieMatrix</span>
    </a>

    <nav class="primary-nav" aria-label="Primary">
      <a class="primary-nav__link" href="#/" data-nav="home">
        <i class="fa-solid fa-house" aria-hidden="true"></i><span>Home</span>
      </a>
      <a class="primary-nav__link" href="#/watchlist" data-nav="watchlist">
        <i class="fa-solid fa-heart" aria-hidden="true"></i><span>My list</span>
        <span class="primary-nav__badge" data-watchlist-count hidden></span>
      </a>
      <a class="primary-nav__link" href="#/recent" data-nav="recent">
        <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i><span>Recent</span>
      </a>
      <a class="primary-nav__link" href="#/schedule" data-nav="schedule">
        <i class="fa-solid fa-calendar-day" aria-hidden="true"></i><span>Tonight</span>
      </a>
    </nav>

    <form class="search" role="search" data-search-form>
      <label class="sr-only" for="search-input">Search shows</label>
      <input id="search-input" class="search__input" type="search"
             placeholder="Search shows..." autocomplete="off"
             data-search-input>
      <button class="search__btn" type="submit" aria-label="Search">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
      </button>
    </form>

    <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">
      <i class="fa-solid fa-moon" aria-hidden="true"></i>
    </button>
  </header>

  <main class="layout">
    <aside class="sidebar" aria-label="Movie extras">
      <section class="widget glass widget--countdown" aria-labelledby="cd-title">
        <header class="widget__header">
          <i class="fa-solid fa-hourglass-start" aria-hidden="true"></i>
          <h2 id="cd-title" class="widget__title">Upcoming releases</h2>
        </header>
        <ol class="widget__body" data-countdown-items></ol>
      </section>

      <section class="widget glass widget--fact" aria-labelledby="ff-title">
        <header class="widget__header">
          <i class="fa-solid fa-lightbulb" aria-hidden="true"></i>
          <h2 id="ff-title" class="widget__title">Fun fact</h2>
        </header>
        <p class="widget__body" data-fun-fact>Loading…</p>
      </section>

      <section class="widget glass widget--quote" aria-labelledby="q-title">
        <header class="widget__header">
          <i class="fa-solid fa-quote-left" aria-hidden="true"></i>
          <h2 id="q-title" class="widget__title">Quote</h2>
        </header>
        <blockquote class="widget__body" data-quote>Loading…</blockquote>
      </section>
    </aside>

    <section class="main-content" aria-label="Shows">
      <section class="carousel glass glass--strong" aria-label="Trending"
               data-carousel data-autoplay="3500" data-view="home">
        <div class="carousel__track" data-carousel-track></div>
        <div class="carousel__controls">
          <button class="carousel__btn" type="button" data-carousel-prev aria-label="Previous slide">
            <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
          </button>
          <div class="carousel__indicators" data-carousel-indicators role="tablist" aria-label="Slides"></div>
          <button class="carousel__btn" type="button" data-carousel-next aria-label="Next slide">
            <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
          </button>
        </div>
      </section>

      <section class="schedule" data-view="schedule" hidden aria-labelledby="sched-title">
        <header class="shows__header">
          <h2 id="sched-title" class="shows__title">On tonight</h2>
          <span class="shows__sub" data-schedule-status></span>
        </header>
        <div class="schedule__list" data-schedule-list></div>
      </section>

      <section class="shows" data-view="home" aria-labelledby="shows-title">
        <header class="shows__header">
          <h2 id="shows-title" class="shows__title">TV shows</h2>
        </header>
        <div class="cat-tabs" data-cat-tabs role="tablist" aria-label="Browse"></div>
        <div class="genre-filter" data-genre-filter role="toolbar" aria-label="Filter by genre"></div>
        <div class="sort-bar" data-sort-bar>
          <label class="sort-bar__field">
            <span>Sort</span>
            <select data-sort-select></select>
          </label>
          <label class="sort-bar__field">
            <span>Year</span>
            <select data-year-select></select>
          </label>
          <span class="sort-bar__count" data-result-count></span>
        </div>
        <div class="shows__grid" data-shows-grid></div>
        <nav class="pagination" aria-label="Pagination" data-pagination></nav>
      </section>

      <section class="shows" data-view="watchlist" hidden aria-labelledby="wl-title">
        <header class="shows__header">
          <h2 id="wl-title" class="shows__title">My list</h2>
          <span class="shows__sub" data-watchlist-meta></span>
        </header>
        <div class="shows__grid" data-watchlist-grid></div>
      </section>

      <section class="shows" data-view="recent" hidden aria-labelledby="rc-title">
        <header class="shows__header">
          <h2 id="rc-title" class="shows__title">Recently viewed</h2>
          <button type="button" class="btn btn--ghost btn--sm" data-recent-clear>
            <i class="fa-solid fa-trash"></i> Clear
          </button>
        </header>
        <div class="shows__grid" data-recent-grid></div>
      </section>
    </section>
  </main>

  <footer class="site-footer">
    <p class="site-footer__quote" data-footer-quote></p>
    <ul class="site-footer__social">
      <li><a href="#" aria-label="Twitter"><i class="fa-brands fa-x-twitter" aria-hidden="true"></i></a></li>
      <li><a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook" aria-hidden="true"></i></a></li>
      <li><a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram" aria-hidden="true"></i></a></li>
    </ul>
  </footer>

  <div class="modal" data-modal hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal__scrim" data-modal-scrim></div>
    <div class="modal__dialog glass glass--strong">
      <header class="modal__header">
        <h2 id="modal-title" class="modal__title" data-modal-title></h2>
        <button class="modal__close" type="button" data-modal-close aria-label="Close">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </header>
      <div class="modal__body" data-modal-body></div>
    </div>
  </div>
</body>
</html>
