<!DOCTYPE html>
<html lang="en">
<head>
  <title>Movie App</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/565394ae51.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="./css/bootstrap.css">
<link rel="stylesheet" href="./css/style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</head>
<body style="font-family: 'Poppins', Arial, sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #fff 100%); min-height: 100vh;">

<div class="container-fluid">
  <div class="row content">
    <div class="col-sm-3 sidenav">

      <h1 class="movie-title m-5 text-center"><span class="badge bg-primary"></i> Movie App</span></h1>
        <form id="search-form">
          <div class="input-group">
            <input type="text" class="form-control search-input bg-light" required placeholder="Search Movie..">
            <button id="searchButton" type="submit" class="btn btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i></button>
          </div>
        </form>
        <div class="sideCard">
          <div class="card  mb-3 mt-5" style="max-width: 26.1rem;">
            <div class="card-header"></div>
            <div class="card-body text-center">
              <img class="custom-gif mb-3" src="./img/movie.gif" alt="gif">
              <!-- Animated movie icon using FontAwesome -->
              <div style="font-size: 2.8rem; color: #2196f3; animation: popMovieIcon 1.5s infinite alternate cubic-bezier(.4,2,.6,1);">
                <i class="fa-solid fa-clapperboard"></i>
                <i class="fa-solid fa-film" style="margin-left: 0.5rem;"></i>
              </div>
              <!-- Fun movie quote -->
              <div style="margin-top: 1.2rem; font-size: 1.1rem; color: #444; font-style: italic;">
                <span>“Movies touch our hearts and awaken our vision.”</span>
              </div>
            </div>
          </div>
        </style>
        <style>
        @keyframes popMovieIcon {
          0% { transform: scale(1) rotate(-5deg); }
          100% { transform: scale(1.18) rotate(8deg); }
        }
        </style>
        </div>

      
    </div>

    <div class="col-sm-9 mt-5 main-content">
      <!-- Trending Movies Carousel -->
      <div id="trendingCarousel" class="carousel slide mb-4" data-ride="carousel" style="box-shadow: 0 4px 24px 0 rgba(31,38,135,0.10); border-radius: 1.2rem; background: rgba(255,255,255,0.95);">
        <ol class="carousel-indicators">
          <li data-target="#trendingCarousel" data-slide-to="0" class="active"></li>
          <li data-target="#trendingCarousel" data-slide-to="1"></li>
          <li data-target="#trendingCarousel" data-slide-to="2"></li>
        </ol>
        <div class="carousel-inner">
        </div>
        <a class="carousel-control-prev" href="#trendingCarousel" role="button" data-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="sr-only">Previous</span>
        </a>
        <a class="carousel-control-next" href="#trendingCarousel" role="button" data-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="sr-only">Next</span>
        </a>
      </div>
      <!-- End Trending Movies Carousel -->
      <div style="box-shadow: 0 8px 32px 0 rgba(31,38,135,0.10); border-radius: 1.2rem; background: rgba(255,255,255,0.85); padding: 1.5rem 1rem 2rem 1rem;">
        <h1 class="movie-title text-center"><span class="badge bg-primary"><i class="fa-solid fa-film"></i> TV Show Information</span></h1>
        <div class="display-data custom-card">
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="container-fluid text-center">
  <p><i class="fa-solid fa-tv"></i></p>
</footer>

<script src="./js/app.js"></script>
</body>
</html>
